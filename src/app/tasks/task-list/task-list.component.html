<div class="task-container">
  <div class="task-header">
    <h2>My Tasks</h2>
    <div class="task-actions">
      <button class="btn btn-primary" routerLink="/tasks/new">
        <span>+ Add New Task</span>
      </button>
    </div>
  </div>

  <div class="task-filters">
    <div class="filter-buttons">
      <button 
        class="btn btn-filter" 
        [class.active]="currentFilter === 'all'"
        (click)="setFilter('all')">
        All Tasks
      </button>
      <button 
        class="btn btn-filter" 
        [class.active]="currentFilter === 'pending'"
        (click)="setFilter('pending')">
        Pending
      </button>
      <button 
        class="btn btn-filter" 
        [class.active]="currentFilter === 'completed'"
        (click)="setFilter('completed')">
        Completed
      </button>
    </div>
  </div>

  <div class="task-list" *ngIf="!isLoading">
    <div class="task-item" *ngFor="let task of filteredTasks" [class.completed]="isTaskCompleted(task)">
      <div class="task-content">
        <div class="task-checkbox">
          <input 
            type="checkbox" 
            [checked]="isTaskCompleted(task)"
            (change)="toggleTaskStatus(task)">
        </div>
        <div class="task-details">
          <h3 class="task-title" [class.completed-text]="isTaskCompleted(task)">{{ task.title }}</h3>
          <p class="task-description">{{ task.description }}</p>
          <div class="task-meta">
            <span class="task-status" [class.status-completed]="isTaskCompleted(task)">
              {{ isTaskCompleted(task) ? 'Completed' : 'Pending' }}
            </span>
            <span class="task-date">Created: {{ (task.createdDate || task.created) | date:'short' }}</span>
          </div>
        </div>
        <div class="task-actions-menu">
          <button class="btn btn-edit" routerLink="/tasks/edit/{{ task.id }}">
            Edit
          </button>
          <button class="btn btn-delete" (click)="deleteTask(task.id)">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div class="no-tasks" *ngIf="filteredTasks.length === 0">
      <p>{{ getEmptyMessage() }}</p>
    </div>
  </div>

  <div class="loading" *ngIf="isLoading">
    <p>Loading tasks...</p>
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>
