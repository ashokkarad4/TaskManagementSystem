<div class="task-form-container">
  <div class="task-form">
    <h2>{{ isEditMode ? 'Edit Task' : 'Create New Task' }}</h2>
    
    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Task Title *</label>
        <input 
          type="text" 
          id="title" 
          formControlName="title" 
          class="form-control"
          placeholder="Enter task title">
        <div class="error" *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
          <small *ngIf="taskForm.get('title')?.hasError('required')">Task title is required</small>
          <small *ngIf="taskForm.get('title')?.hasError('minlength')">Title must be at least 3 characters</small>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea 
          id="description" 
          formControlName="description" 
          class="form-control"
          rows="4"
          placeholder="Enter task description (optional)"></textarea>
      </div>

      <div class="form-group">
        <label for="isCompleted">Status</label>
        <div class="checkbox-group">
          <input 
            type="checkbox" 
            id="isCompleted" 
            formControlName="isCompleted"
            [checked]="taskForm.get('isCompleted')?.value"
            (change)="taskForm.get('isCompleted')?.setValue($event.target.checked)">
          <label for="isCompleted" class="checkbox-label">Mark as completed</label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="taskForm.invalid || isLoading">
          <span *ngIf="!isLoading">{{ isEditMode ? 'Update Task' : 'Create Task' }}</span>
          <span *ngIf="isLoading">{{ isEditMode ? 'Updating...' : 'Creating...' }}</span>
        </button>
        
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="isLoading">
          Cancel
        </button>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
    </form>
  </div>
</div>
